services:
  database:
    command: --port=3306
    expose:
      - "3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -P 3306 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]

  api:
    image: ghcr.io/mateja-velickovic/stockhub-backend:${BACKEND_VERSION}
    environment:
      DB_PORT: 3306
    ports :
      - "127.0.0.1:3000:3000"

  web:
    image: ghcr.io/mateja-velickovic/stockhub-frontend:${FRONTEND_VERSION}

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    networks:
      - frontend_network

volumes:
  caddy_data:
  caddy_config: