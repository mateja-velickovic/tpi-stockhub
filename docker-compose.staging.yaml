services:
  database:
    command: --port=3307
    expose:
      - "3307"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -P 3307 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]

  api:
    image: ghcr.io/mateja-velickovic/stockhub-backend:latest
    build : null
    environment:
      DB_PORT: 3307
      PORT: 3000
    ports :
      - "127.0.0.1:3000:3000"
      
  web:
    image: ghcr.io/mateja-velickovic/stockhub-frontend:latest
    build : null
    ports:
      - "127.0.0.1:5173:80"