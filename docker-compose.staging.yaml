services:
  database:
    command: --port=3307
    expose:
      - "3307"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -P 3307 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  api:
    image: ghcr.io/mateja-velickovic/stockhub-backend-staging:${BACKEND_VERSION}
    build : null
    environment:
      DB_PORT: 3307
      PORT: 3007
    ports :
      - "127.0.0.1:3007:3007"
      
  web:
    image: ghcr.io/mateja-velickovic/stockhub-frontend:${FRONTEND_VERSION}
    build : null
    ports:
      - "127.0.0.1:5173:80"