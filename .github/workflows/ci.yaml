name: StockHub | CI Workflow

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  
jobs:
  backend:
    name: Backend CI Workflow

    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Node installation
        uses: actions/setup-node@v4
        with:
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
        
      - name: Setup Backend
        run: npm ci --prefer-offline

      - name: Packages Audit
        run: npm audit --audit-level=critical

      - name: Run Backend Tests
        run: npm run test:coverage

      - name: Build coverage summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: backend/coverage/cobertura-coverage.xml
          badge: true
          format: markdown
          output: both
          indicators: true

      - name: Publish coverage in job summary
        run: cat ../code-coverage-results.md >> $GITHUB_STEP_SUMMARY

      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: |
            backend/coverage/
            backend/coverage/cobertura-coverage.xml
          if-no-files-found: error

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: backend/coverage/cobertura-coverage.xml
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Lint Backend Code
        run: npm run lint
      
      - name: Type Check Backend Code
        run: npm run typecheck

      - name : Build Backend
        run: npm run build

  frontend:
    name: Frontend CI Workflow

    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Node installation
        uses: actions/setup-node@v4
        with:
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
        
      - name: Setup Frontend
        run: npm ci --prefer-offline

      - name: Packages Audit
        run: npm audit --audit-level=critical

      - name: Run Frontend Tests
        run: npm run test:coverage

      - name: Lint Frontend Code
        run: npm run lint
      
      - name: Type Check Frontend Code
        run: npm run typecheck

      - name : Build Frontend
        run: npm run build